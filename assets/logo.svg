<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strong-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001408"/>
      <stop offset="100%" stop-color="#080c08"/>
    </radialGradient>
    <radialGradient id="inner-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff46" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ff46" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="12" y="12" width="232" height="232" rx="51" ry="51" fill="url(#bg-grad)"/>
  
  <!-- Grid lines -->
  <g stroke="#003c0f" stroke-width="0.5" opacity="0.5">
    <line x1="12" y1="12" x2="12" y2="244"/><line x1="28" y1="12" x2="28" y2="244"/><line x1="44" y1="12" x2="44" y2="244"/><line x1="60" y1="12" x2="60" y2="244"/><line x1="76" y1="12" x2="76" y2="244"/><line x1="92" y1="12" x2="92" y2="244"/><line x1="108" y1="12" x2="108" y2="244"/><line x1="124" y1="12" x2="124" y2="244"/><line x1="140" y1="12" x2="140" y2="244"/><line x1="156" y1="12" x2="156" y2="244"/><line x1="172" y1="12" x2="172" y2="244"/><line x1="188" y1="12" x2="188" y2="244"/><line x1="204" y1="12" x2="204" y2="244"/><line x1="220" y1="12" x2="220" y2="244"/><line x1="236" y1="12" x2="236" y2="244"/>
    <line x1="12" y1="12" x2="244" y2="12"/><line x1="12" y1="28" x2="244" y2="28"/><line x1="12" y1="44" x2="244" y2="44"/><line x1="12" y1="60" x2="244" y2="60"/><line x1="12" y1="76" x2="244" y2="76"/><line x1="12" y1="92" x2="244" y2="92"/><line x1="12" y1="108" x2="244" y2="108"/><line x1="12" y1="124" x2="244" y2="124"/><line x1="12" y1="140" x2="244" y2="140"/><line x1="12" y1="156" x2="244" y2="156"/><line x1="12" y1="172" x2="244" y2="172"/><line x1="12" y1="188" x2="244" y2="188"/><line x1="12" y1="204" x2="244" y2="204"/><line x1="12" y1="220" x2="244" y2="220"/><line x1="12" y1="236" x2="244" y2="236"/>
  </g>
  
  <!-- Inner ambient glow -->
  <ellipse cx="128" cy="128" rx="90" ry="90" fill="url(#inner-glow)"/>
  
  <!-- Outer ring glow -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#00ff46" stroke-width="12" opacity="0.1"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#00ff46" stroke-width="8" opacity="0.2"/>
  <!-- Outer ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#00ff46" stroke-width="4" filter="url(#neon-glow)" opacity="0.9"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="72" fill="none" stroke="#008c28" stroke-width="2" opacity="0.7"/>

  <!-- Tick marks -->
  <line x1="224.0" y1="128.0" x2="214.0" y2="128.0" stroke="#78ff8c" stroke-width="2"/><line x1="195.9" y1="195.9" x2="192.3" y2="192.3" stroke="#008c28" stroke-width="2"/><line x1="128.0" y1="224.0" x2="128.0" y2="214.0" stroke="#78ff8c" stroke-width="2"/><line x1="60.1" y1="195.9" x2="63.7" y2="192.3" stroke="#008c28" stroke-width="2"/><line x1="32.0" y1="128.0" x2="42.0" y2="128.0" stroke="#78ff8c" stroke-width="2"/><line x1="60.1" y1="60.1" x2="63.7" y2="63.7" stroke="#008c28" stroke-width="2"/><line x1="128.0" y1="32.0" x2="128.0" y2="42.0" stroke="#78ff8c" stroke-width="2"/><line x1="195.9" y1="60.1" x2="192.3" y2="63.7" stroke="#008c28" stroke-width="2"/>

  <!-- Shield fill -->
  <polygon points="88,98 128,83 168,98 168,133 128,173 88,133" fill="#003c0f" opacity="0.85"/>
  <!-- Shield glow -->
  <polygon points="88,98 128,83 168,98 168,133 128,173 88,133" fill="none" stroke="#00ff46" stroke-width="7" opacity="0.15"/>
  <polygon points="88,98 128,83 168,98 168,133 128,173 88,133" fill="none" stroke="#00ff46" stroke-width="5" opacity="0.25"/>
  <!-- Shield outline -->
  <polygon points="88,98 128,83 168,98 168,133 128,173 88,133" fill="none" stroke="#00ff46" stroke-width="3" filter="url(#neon-glow)"/>

  <!-- MW lettermark glow -->
  <polyline points="107,141 107,111 116,124 126,111 126,141" fill="none" stroke="#00ff46" stroke-width="7" stroke-linejoin="miter" opacity="0.15"/>
  <polyline points="107,141 107,111 116,124 126,111 126,141" fill="none" stroke="#00ff46" stroke-width="5" stroke-linejoin="miter" opacity="0.25"/>
  <!-- M -->
  <polyline points="107,141 107,111 116,124 126,111 126,141" fill="none" stroke="#78ff8c" stroke-width="3" stroke-linejoin="miter" filter="url(#strong-glow)"/>
  
  <!-- W glow -->
  <polyline points="130,111 134,141 139,127 144,141 149,111" fill="none" stroke="#00ff46" stroke-width="7" stroke-linejoin="miter" opacity="0.15"/>
  <polyline points="130,111 134,141 139,127 144,141 149,111" fill="none" stroke="#00ff46" stroke-width="5" stroke-linejoin="miter" opacity="0.25"/>
  <!-- W -->
  <polyline points="130,111 134,141 139,127 144,141 149,111" fill="none" stroke="#78ff8c" stroke-width="3" stroke-linejoin="miter" filter="url(#strong-glow)"/>

  <!-- Lock shackle -->
  <path d="M 118,75 A 10,10 0 0,1 138,75" 
        fill="none" stroke="#00ff46" stroke-width="2" filter="url(#neon-glow)" opacity="0.9"/>
  <line x1="118" y1="75" x2="118" y2="85" 
        stroke="#00ff46" stroke-width="2" opacity="0.9"/>
  <line x1="138" y1="75" x2="138" y2="85" 
        stroke="#00ff46" stroke-width="2" opacity="0.9"/>
</svg>